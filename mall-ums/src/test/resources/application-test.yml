# 测试环境配置
spring:
  datasource:
    # 使用H2内存数据库，避免影响生产数据
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  # 启用H2控制台
  h2:
    console:
      enabled: true
      path: /h2-console

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.mall_tiny01.mbg.model

# 日志配置
logging:
  level:
    org.example.mall_tiny01: DEBUG
    org.springframework.web: DEBUG

# JWT配置（测试用）
jwt:
  tokenHeader: Authorization
  secret: mall-tiny-secret
  expiration: 3600
  tokenHead: Bearer 