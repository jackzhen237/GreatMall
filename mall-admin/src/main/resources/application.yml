spring:
  application:
    name: mall-admin
  config:
    import: "optional:nacos:mall-admin"
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: Zhc5gu7Vs778
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        username: nacos
        password: Zhc5gu7Vs778

  # 数据源配置 - 如果admin不需要数据库可以删除
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: "jdbc:mysql://192.168.158.130:3306/mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  # Redis 哨兵模式（Spring Data Redis 用）
  data:
    redis:
      host: 192.168.158.130
      port: 6379
      database: 0
  # Redis 哨兵模式（Redisson 用）

  # ES 本机 7.17.3，已装拼音+IK 插件
  elasticsearch:
    uris: http://127.0.0.1:9200

# 服务器配置
server:
  port: 8085

# 支付宝沙箱配置
alipay:
  app-id: 9021000163684278
  app-private-key: |
    
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  notify-url: http://localhost:8085/alipay/notify
  return-url: http://localhost:8085/return
  format: json
  charset: utf-8
  sign-type: RSA2

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml,classpath*:mapper/**/*.xml  # Mapper XML文件位置，包含resources/mapper和根目录mapper
  type-aliases-package: org.example.mall_tiny01.mbg.model,org.example.mall_tiny01.mapper  # 实体类包路径，包含mbg.model和mapper包
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper分页插件配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# JWT配置
jwt:
  header: Authorization
  tokenPrefix: "Bearer "

# MinIO配置
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: mall


# Seata 分布式事务配置（AT 模式）- 暂时禁用
seata:
  enabled: false
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: 127.0.0.1:8850
      group: SEATA_GROUP
      namespace: "public"
      username: nacos
      password: nacos
  config:
    type: file
  tx-service-group: mall_tx_group
  data-source-proxy-mode: AT
  service:
    vgroup-mapping:
      mall_tx_group: default

# Feign 超时 + Sentinel 熔断配置
feign:
  sentinel:
    enabled: true  # 开启 Sentinel 对 Feign 的熔断保护
  client:
    config:
      default:
        connectTimeout: 3000   # 连接超时：3 秒
        readTimeout: 5000      # 读取超时：5 秒
  compression:
    request:
      enabled: true
    response:
      enabled: true

#  阿里云 OSS 配置

# Swagger UI 配置（强制启用，不走鉴权）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  default-produces-media-type: application/json