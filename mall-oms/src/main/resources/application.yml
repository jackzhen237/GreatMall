  datasource:
    url: jdbc:mysql://192.168.158.130:3306/mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: Zhc5gu7Vs778
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        username: nacos
        password: Zhc5gu7Vs778
  data:
    redis:
      host: 192.168.158.130
      port: 6379
      database: 0

# Minio 对象存储配置
minio:
  endpoint: http://127.0.0.1:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: mall


# Seata 分布式事务配置（AT 模式）- 暂时禁用
seata:
  enabled: false
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: 127.0.0.1:8850
      group: SEATA_GROUP
  config:
    type: file
  tx-service-group: mall_tx_group
  data-source-proxy-mode: AT
  service:
    vgroup-mapping:
      mall_tx_group: default

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Feign 超时配置（防止远程调用拖垮线程池）
feign:
  client:
    config:
      default:
        connectTimeout: 3000   # 连接超时：3 秒
        readTimeout: 5000      # 读取超时：5 秒
  compression:
    request:
      enabled: true
    response:
      enabled: true

# Actuator 监控配置（Prometheus + Micrometer 埋点）
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
    export:
      prometheus:
        enabled: true
      tags:
      application: ${spring.application.name}

# Swagger UI 配置（强制启用，不走鉴权）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  default-produces-media-type: application/json