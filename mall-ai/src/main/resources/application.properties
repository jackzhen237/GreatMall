# ==================================================
#  mall-ai 应用程序配置文件
# ==================================================

# 应用名称
spring.application.name=mall-ai

# ==================================================
# Ollama 模型配置
# ==================================================

# Ollama 服务的基地址
# 默认值：http://localhost:11434
# 说明：Ollama 默认监听 11434 端口，如需修改请确保与本地 Ollama 服务地址一致
ollama.base-url=http://localhost:11434

# 使用的模型名称
# 默认值：qwen2.5
# 说明：确保本地已通过 "ollama pull qwen2.5" 下载该模型
# 可更改为其他已下载的模型，如 llama2、mistral 等
ollama.model-name=qwen2.5

# ==================================================
# 服务器配置
# ==================================================

# 服务端口
# 默认值：8080
# 说明：Spring Boot 应用默认端口，如需修改请确保无端口冲突
server.port=8080
